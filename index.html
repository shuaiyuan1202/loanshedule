<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房贷提前还款推演系统</title>
    <!-- 引入 Tailwind CSS 进行样式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 ECharts 进行图表绘制 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f3f4f6; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="text-gray-800">

<div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
    
    <!-- 头部信息 -->
    <div class="mb-8 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
        <div class="text-center sm:text-left">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">房贷提前还款推演系统</h1>
            <p class="text-gray-500 text-sm">
                初始本金: 135.5万元 | 利率: 2.9% | 终点: 2051年7月
            </p>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
            <!-- 出生年月配置 -->
            <div class="flex items-center bg-white px-4 py-3 rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
                <label class="text-sm font-medium text-gray-700 whitespace-nowrap mr-2">出生年月:</label>
                <input type="number" id="input-birth-year" value="1995" class="form-input w-20 rounded-md border-gray-300 border px-2 py-1 text-sm focus:border-blue-500 focus:ring-blue-500 text-center font-bold text-blue-600">
                <span class="mx-1 text-gray-500 text-sm whitespace-nowrap">年</span>
                <select id="select-birth-month" class="w-16 rounded-md border-gray-300 border px-2 py-1 text-sm focus:border-blue-500 focus:ring-blue-500 text-center font-bold text-blue-600 bg-white">
                    <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                    <option value="4">4</option><option value="5">5</option><option value="6">6</option>
                    <option value="7">7</option><option value="8">8</option><option value="9">9</option>
                    <option value="10">10</option><option value="11">11</option><option value="12">12</option>
                </select>
                <span class="ml-1 text-gray-500 text-sm whitespace-nowrap">月</span>
            </div>
        </div>
    </div>

    <!-- 数据看板 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-gray-400">
            <h3 class="text-sm font-medium text-gray-500">初始基准月供</h3>
            <p class="text-2xl font-bold text-gray-900 mt-1" id="stat-initial-payment">6,296 元</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-emerald-500 flex flex-col justify-center">
            <h3 class="text-sm font-medium text-gray-500" id="card2-title">当前最低常规月供</h3>
            <div class="flex items-baseline gap-2 mt-1">
                <p class="text-2xl font-bold text-emerald-600" id="stat-final-payment">6,296 元</p>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-blue-500 flex flex-col justify-center">
            <h3 class="text-sm font-medium text-gray-500" id="card3-title">预计最终结清时间</h3>
            <div class="flex items-baseline gap-2 mt-1">
                <p class="text-2xl font-bold text-blue-600" id="stat-final-date">2051-07</p>
                <p class="text-sm font-bold text-blue-500 hidden bg-blue-50 px-2 py-0.5 rounded" id="stat-saved-time"></p>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-emerald-400 flex flex-col justify-center">
            <h3 class="text-sm font-medium text-gray-500">累计为您节省利息</h3>
            <p class="text-2xl font-bold text-emerald-600 mt-1" id="stat-saved-interest">0 元</p>
            <div class="text-xs text-gray-500 mt-2 bg-gray-50 px-2 py-1 rounded inline-block w-fit border border-gray-100">
                预计总付利息: <span class="text-rose-500 font-bold" id="stat-total-interest">0 元</span>
            </div>
        </div>
    </div>

    <!-- 图表区 (全宽) -->
    <div id="chart-card" class="bg-white rounded-xl shadow-sm p-4 relative mb-6 border-2 border-transparent">
        <div class="mb-2 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
            <h2 class="text-lg font-bold text-gray-800">月供变化曲线</h2>
            <div class="flex items-center gap-3">
                <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded hidden sm:inline-block">点击曲线添加 / 拖拽标记移动 / 滚轮缩放</span>
            </div>
        </div>
        
        <!-- 核心重构：包装容器，用于安全承载图表和拖拽跟随提示标签 -->
        <div class="relative w-full h-[500px]">
            <div id="chart-container" class="w-full h-full"></div>
            
            <!-- 原生 DOM 拖拽指示标签，彻底绕过 ECharts 内部渲染机制，100% 稳定跟手 -->
            <div id="drag-tooltip" class="absolute hidden bg-blue-900 text-white px-3 py-1.5 rounded-lg shadow-xl pointer-events-none z-50 transform -translate-x-1/2 -translate-y-full whitespace-nowrap text-center before:content-[''] before:absolute before:top-full before:left-1/2 before:-translate-x-1/2 before:border-4 before:border-transparent before:border-t-blue-900 transition-none" style="margin-top: -8px;">
                <div class="text-[10px] text-blue-200 leading-none mb-1 font-normal tracking-wide">释放移至</div>
                <div class="text-sm font-bold leading-none tracking-wide" id="drag-tooltip-text">2026-03</div>
            </div>
        </div>
    </div>

    <!-- 操作与历史记录区 (底部详情表格) -->
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">提前还款操作详情</h2>
        
        <div id="empty-state" class="text-center text-gray-400 py-10">
            <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
            </svg>
            <p class="mt-2 text-sm">暂无记录，请点击上方图表节点添加</p>
        </div>

        <div id="repayment-list" class="overflow-x-auto hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作时间</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">提前还款金额</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">执行策略</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">产生的效果</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200" id="history-tbody">
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 交互弹窗 (Modal) -->
<div id="modal" class="fixed inset-0 modal-bg flex items-center justify-center hidden z-50 opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl w-96 p-6 transform scale-95 transition-transform duration-300" id="modal-content">
        <h3 class="text-xl font-bold text-gray-900 mb-1">添加提前还款</h3>
        <p class="text-sm text-gray-500 mb-6" id="modal-subtitle">操作月份: 2026年3月</p>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">提前还款金额 (万元)</label>
            <div class="relative rounded-md shadow-sm">
                <input type="number" id="input-amount" class="form-input block w-full rounded-md border-gray-300 border px-4 py-2 focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="例如: 3">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <span class="text-gray-500 sm:text-sm">万元</span>
                </div>
            </div>
            <p class="text-xs text-rose-500 mt-2 hidden" id="modal-error">请输入大于 0 的有效数字</p>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">本次还款策略配置</label>
            <div class="grid grid-cols-2 gap-3">
                <label class="relative flex cursor-pointer rounded-lg border bg-white p-3 shadow-sm focus:outline-none">
                    <input type="radio" name="modal-mode" value="reduce_payment" class="sr-only" checked>
                    <span class="flex flex-1"><span class="flex flex-col"><span class="block text-sm font-medium text-gray-900">减月供</span><span class="mt-1 flex items-center text-xs text-gray-500">年限不变</span></span></span>
                    <svg class="h-5 w-5 text-blue-600 hidden modal-mode-check" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                    <span class="pointer-events-none absolute -inset-px rounded-lg border-2 border-transparent modal-mode-border"></span>
                </label>

                <label class="relative flex cursor-pointer rounded-lg border bg-white p-3 shadow-sm focus:outline-none">
                    <input type="radio" name="modal-mode" value="shorten_time" class="sr-only">
                    <span class="flex flex-1"><span class="flex flex-col"><span class="block text-sm font-medium text-gray-900">缩时间</span><span class="mt-1 flex items-center text-xs text-gray-500">月供不变</span></span></span>
                    <svg class="h-5 w-5 text-blue-600 hidden modal-mode-check" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                    <span class="pointer-events-none absolute -inset-px rounded-lg border-2 border-transparent modal-mode-border"></span>
                </label>
            </div>
        </div>

        <div class="mt-6 flex justify-between items-center">
            <button id="btn-delete" class="px-4 py-2 text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition hidden">清空记录</button>
            <div class="flex gap-3 ml-auto">
                <button id="btn-cancel" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">取消</button>
                <button id="btn-confirm" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-md">确认执行</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 核心配置与状态 ---
    const CONFIG = {
        principal: 1355000,    // 初始本金 135.5万
        annualRate: 0.029,     // 年化利率 2.9%
        startYear: 2026,
        startMonth: 3,         // 从 2026年3月算起
        totalMonths: 304       // 到2051年7月正好剩余 304 个月
    };

    let earlyRepayments = []; 
    let birthYear = 1995;
    let birthMonth = 1;
    let cachedChartData = []; 
    let currentSelectedIndex = 0;
    let isDraggingGraphic = false; // 拖拽安全锁
    
    // 初始化本地存储
    try {
        const savedData = localStorage.getItem('mortgage_repayments_v1');
        if (savedData) {
            const parsed = JSON.parse(savedData);
            if (Array.isArray(parsed)) { earlyRepayments = parsed; } 
            else {
                earlyRepayments = parsed.repayments || [];
                if (parsed.birthYear) birthYear = parsed.birthYear;
                if (parsed.birthMonth) birthMonth = parsed.birthMonth;
            }
            earlyRepayments = earlyRepayments.map(item => ({
                index: item.index, amount: item.amount, mode: item.mode || 'reduce_payment' 
            }));
        }
    } catch (e) { console.error(e); }

    document.getElementById('input-birth-year').value = birthYear;
    document.getElementById('select-birth-month').value = birthMonth;

    function saveToLocalStorage() {
        localStorage.setItem('mortgage_repayments_v1', JSON.stringify({
            repayments: earlyRepayments, birthYear: birthYear, birthMonth: birthMonth
        }));
    }

    let chartInstance = null;
    let baseTotalInterest = 0;
    let lastRenderedYear = -1;
    let formatterResetTimer = null;

    // --- 核心数学计算 ---
    function calculatePMT(principal, monthlyRate, months) {
        if (principal <= 0) return 0;
        return principal * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
    }

    function getMonthString(index) {
        let y = CONFIG.startYear + Math.floor((CONFIG.startMonth - 1 + index) / 12);
        let m = ((CONFIG.startMonth - 1 + index) % 12) + 1;
        return `${y}-${m.toString().padStart(2, '0')}`;
    }

    function generateSimulationData(repaymentsData = earlyRepayments) {
        let p = CONFIG.principal;
        let r = CONFIG.annualRate / 12;
        let n = CONFIG.totalMonths;
        
        let originalPMT = calculatePMT(p, r, n);
        let currentPMT = originalPMT;
        let data = [];
        let totalInterestPaid = 0;

        for (let i = 0; i < CONFIG.totalMonths; i++) {
            let earlyObj = repaymentsData.find(e => e.index === i);
            let earlyExtra = earlyObj ? earlyObj.amount : 0;
            let earlyMode = earlyObj ? (earlyObj.mode || 'reduce_payment') : null;

            if (p <= 0.01) {
                data.push({
                    index: i, date: getMonthString(i), payment: 0, principalRemaining: 0, extra: earlyExtra, mode: earlyMode
                });
                continue;
            }

            let interest = p * r;
            let actualPMT = currentPMT;
            if (p * (1 + r) < currentPMT) { actualPMT = p * (1 + r); }
            let normalPrincipalPaid = actualPMT - interest;

            data.push({
                index: i, date: getMonthString(i), payment: actualPMT, principalRemaining: p, extra: earlyExtra, mode: earlyMode
            });

            totalInterestPaid += interest;
            p -= normalPrincipalPaid;
            
            if (earlyExtra > 0) {
                p -= earlyExtra;
                if (p < 0) p = 0;
                if (p > 0 && earlyMode === 'reduce_payment') {
                    let remainingMonths = CONFIG.totalMonths - i - 1;
                    if (remainingMonths > 0) currentPMT = calculatePMT(p, r, remainingMonths);
                }
            }
        }
        return { chartData: data, totalInterestPaid };
    }

    // 为图表数据附带“效果文案”
    function enrichChartDataWithEffects(chartData, sortedRepayments) {
        sortedRepayments.forEach((item, loopIndex) => {
            let dataPoint = chartData.find(d => d.index === item.index);
            if (!dataPoint) return;
            
            if (item.mode === 'reduce_payment') {
                let nextData = chartData.find(d => d.index === item.index + 1);
                let savedMonthly = dataPoint.payment - (nextData ? nextData.payment : 0);
                dataPoint.effectText = `立减月供：${savedMonthly.toFixed(2)} 元`;
            } else {
                let previousRepayments = sortedRepayments.slice(0, loopIndex);
                let currentRepayments = sortedRepayments.slice(0, loopIndex + 1);
                let previousSim = generateSimulationData(previousRepayments).chartData.filter(d => d.payment > 0);
                let currentSim = generateSimulationData(currentRepayments).chartData.filter(d => d.payment > 0);
                
                let savedMonthsByThisAction = previousSim.length - currentSim.length;
                if (savedMonthsByThisAction > 0) {
                    let y = Math.floor(savedMonthsByThisAction / 12);
                    let m = savedMonthsByThisAction % 12;
                    dataPoint.effectText = `刑期缩短：${y > 0 ? y + '年' : ''}${m}个月`;
                } else {
                    dataPoint.effectText = `加速结清进程`;
                }
            }
        });
        return chartData;
    }

    // --- 图表与 UI 渲染 ---
    function initChart() {
        chartInstance = echarts.init(document.getElementById('chart-container'));
        chartInstance.on('click', function (params) {
            if(params.componentType === 'series') { openModal(params.dataIndex); }
        });
        
        chartInstance.on('dataZoom', updateDraggableGraphics);

        window.addEventListener('resize', () => { 
            if (chartInstance) chartInstance.resize(); 
            updateDraggableGraphics();
        });
    }

    function buildChartOption(fullChartData, zoomStart = 0, zoomEnd = 100) {
        return {
            tooltip: {
                trigger: 'axis',
                backgroundColor: 'rgba(255, 255, 255, 0.95)',
                borderColor: '#3b82f6',
                borderWidth: 1,
                padding: 12,
                shadowBlur: 10,
                shadowColor: 'rgba(59, 130, 246, 0.3)',
                formatter: function(params) {
                    let pt = params[0].data;
                    let year = parseInt(pt.date.split('-')[0], 10);
                    let month = parseInt(pt.date.split('-')[1], 10);
                    let currentAge = Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0));
                    
                    let str = `<div class="font-bold border-b pb-1 mb-2 text-base">${pt.date} <span class="text-orange-500 font-normal ml-1">(${currentAge}岁)</span></div>`;
                    
                    if (pt.payment <= 0.01) {
                        str += `<div class="text-emerald-500 font-bold text-[15px] py-1">🎉 此时已提前结清，无需还款</div>`;
                    } else {
                        str += `<div class="text-gray-600 mb-1">当月需还：<span class="text-blue-600 font-bold text-lg">${pt.payment.toFixed(2)}</span> 元</div>`;
                        str += `<div class="text-gray-500 text-sm">剩余本金：${(pt.principalRemaining / 10000).toFixed(2)} 万</div>`;
                    }

                    if (pt.extra > 0) {
                        let effectColor = pt.mode === 'shorten_time' ? 'text-purple-600' : 'text-emerald-600';
                        str += `<div class="mt-3 pt-2 border-t border-dashed border-gray-200 bg-rose-50 -mx-3 px-3 pb-2 rounded-b">`;
                        str += `<div class="text-rose-600 font-bold text-[15px]">💰 提前还款：${(pt.extra / 10000).toFixed(2)} 万</div>`;
                        str += `<div class="font-medium ${effectColor} mt-1 flex items-center gap-1"><svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.38z" clip-rule="evenodd" /></svg>${pt.effectText}</div>`;
                        str += `</div>`;
                    }
                    return str;
                }
            },
            dataZoom: [
                { type: 'inside', start: zoomStart, end: zoomEnd },
                { type: 'slider', start: zoomStart, end: zoomEnd, height: 20, bottom: 5 }
            ],
            grid: { left: '3%', right: '4%', bottom: '15%', top: '10%', containLabel: true },
            xAxis: {
                type: 'category', boundaryGap: false, data: fullChartData.map(d => d.date),
                axisLabel: { 
                    color: '#6b7280',
                    formatter: function (value) {
                        let parts = value.split('-'); let year = parseInt(parts[0], 10); let month = parseInt(parts[1], 10);
                        clearTimeout(formatterResetTimer); formatterResetTimer = setTimeout(() => { lastRenderedYear = -1; }, 50);
                        let str = `{year|${value}}`;
                        if (year !== lastRenderedYear) {
                            lastRenderedYear = year; let currentAge = Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0));
                            str += `\n{age|${currentAge}岁}`;
                        }
                        return str;
                    },
                    rich: { year: { color: '#6b7280', lineHeight: 22 }, age: { color: '#ea580c', fontWeight: 'bold', fontSize: 11, backgroundColor: '#ffedd5', padding: [2, 5], borderRadius: 4, align: 'center' } }
                }
            },
            yAxis: {
                type: 'value', name: '月供 (元)',
                max: Math.ceil(fullChartData[0]?.payment || 6500) + 500,
                axisLabel: { color: '#6b7280' }, splitLine: { lineStyle: { type: 'dashed', color: '#e5e7eb' } }
            },
            series: [{
                name: '月供金额', type: 'line', step: 'end',
                markPoint: {
                    symbol: 'pin', symbolSize: 50,
                    label: { color: '#fff', fontSize: 11, formatter: '{c}' },
                    itemStyle: { color: '#ef4444', shadowBlur: 10, shadowColor: 'rgba(239, 68, 68, 0.5)' },
                    data: fullChartData.filter(d => d.extra > 0).map(d => ({
                        name: '提前还款', coord: [d.date, d.payment], value: (d.extra / 10000) + '万'
                    }))
                },
                data: fullChartData.map(d => ({
                    name: d.date,
                    value: [d.date, d.payment], 
                    date: d.date, payment: d.payment, principalRemaining: d.principalRemaining, extra: d.extra, mode: d.mode, effectText: d.effectText,
                    symbolSize: d.extra > 0 ? 14 : 6,
                    itemStyle: { color: d.extra > 0 ? '#ef4444' : '#3b82f6', borderWidth: d.extra > 0 ? 3 : 1 }
                })),
                lineStyle: { width: 3, color: '#3b82f6' },
                areaStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: 'rgba(59, 130, 246, 0.5)' }, { offset: 1, color: 'rgba(59, 130, 246, 0.0)' }
                    ])
                }
            }],
            animation: true
        };
    }

    // --- 互动拖拽核心引擎 ---
    function updateDraggableGraphics() {
        if (!chartInstance || isDraggingGraphic) return;

        let newGraphicElements = [];
        const dragTooltip = document.getElementById('drag-tooltip');
        const dragTooltipText = document.getElementById('drag-tooltip-text');

        earlyRepayments.forEach((item) => {
            let d = cachedChartData.find(data => data.index === item.index);
            if (!d) return;

            let coord = chartInstance.convertToPixel({seriesIndex: 0}, [getMonthString(item.index), d.payment]);
            if (!coord) return;

            let gid = 'drag_pin_' + item.index;

            newGraphicElements.push({
                type: 'circle',
                id: gid,
                position: [coord[0], coord[1] - 25], 
                shape: { r: 30 }, 
                style: { fill: 'transparent' }, 
                cursor: 'grab',
                draggable: true,
                z: 100,
                onclick: function () {
                    if (!isDraggingGraphic) openModal(item.index);
                },
                onmouseover: function () {
                    if (isDraggingGraphic) return;
                    chartInstance.dispatchAction({ type: 'showTip', seriesIndex: 0, dataIndex: item.index });
                },
                onmouseout: function () {
                    if (isDraggingGraphic) return;
                    chartInstance.dispatchAction({ type: 'hideTip' });
                },
                ondragstart: function (params) {
                    isDraggingGraphic = true; 
                    chartInstance.dispatchAction({ type: 'hideTip' }); // 隐藏内置 tooltip
                    
                    // 获取当前悬停点信息
                    let year = parseInt(getMonthString(item.index).split('-')[0], 10);
                    let month = parseInt(getMonthString(item.index).split('-')[1], 10);
                    let currentAge = Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0));
                    
                    // 唤起并定位自定义 HTML Tooltip
                    dragTooltipText.innerHTML = `${getMonthString(item.index)} <span class="text-[11px] text-blue-300 font-normal">(${currentAge}岁)</span>`;
                    dragTooltip.style.left = this.x + 'px';
                    dragTooltip.style.top = (this.y - 10) + 'px'; // 悬浮于圆点上方
                    dragTooltip.classList.remove('hidden');
                },
                ondrag: function (params) {
                    this.y = coord[1] - 25; // 锁死 Y 轴
                    let currentX = this.x;  

                    let pointInGrid = chartInstance.convertFromPixel({seriesIndex: 0}, [currentX, this.y]);
                    if (!pointInGrid) return;

                    let newXIndex = Math.max(0, Math.min(CONFIG.totalMonths - 1, Math.round(pointInGrid[0])));
                    
                    let year = parseInt(getMonthString(newXIndex).split('-')[0], 10);
                    let month = parseInt(getMonthString(newXIndex).split('-')[1], 10);
                    let currentAge = Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0));
                    
                    // 实时更新 HTML Tooltip 的内容和位置 (完全跟手)
                    dragTooltipText.innerHTML = `${getMonthString(newXIndex)} <span class="text-[11px] text-blue-300 font-normal">(${currentAge}岁)</span>`;
                    dragTooltip.style.left = currentX + 'px';
                    dragTooltip.style.top = (this.y - 10) + 'px'; 
                },
                ondragend: function (params) {
                    let finalX = this.x;
                    dragTooltip.classList.add('hidden'); // 隐藏拖拽提示框

                    // 使用 setTimeout 避开引擎底层销毁真空期
                    setTimeout(() => {
                        isDraggingGraphic = false; 

                        let pointInGrid = chartInstance.convertFromPixel({seriesIndex: 0}, [finalX, coord[1] - 25]);
                        if (!pointInGrid) {
                            updateDraggableGraphics(); return;
                        }
                        
                        let newXIndex = Math.max(0, Math.min(CONFIG.totalMonths - 1, Math.round(pointInGrid[0])));

                        let existItemIndex = earlyRepayments.findIndex(e => e.index === item.index);
                        if (existItemIndex > -1) {
                            if (newXIndex === item.index) {
                                updateDraggableGraphics(); return; 
                            }
                            let conflict = earlyRepayments.find(e => e.index === newXIndex && e.index !== item.index);
                            if (!conflict) {
                                earlyRepayments[existItemIndex].index = newXIndex;
                                saveToLocalStorage();
                                updateDashboard(); 
                            } else {
                                updateDraggableGraphics(); 
                            }
                        }
                    }, 150);
                }
            });
        });

        chartInstance.setOption({ graphic: newGraphicElements }, { replaceMerge: ['graphic'] });
    }

    function updateDashboard() {
        isDraggingGraphic = false; 
        document.getElementById('drag-tooltip').classList.add('hidden'); // 防御性重置
        
        let currentZoomStart = 0;
        let currentZoomEnd = 100;
        if (chartInstance) {
            let op = chartInstance.getOption();
            if (op && op.dataZoom && op.dataZoom.length > 0) {
                currentZoomStart = op.dataZoom[0].start;
                currentZoomEnd = op.dataZoom[0].end;
            }
        }
        
        let baseSim = generateSimulationData([]);
        baseTotalInterest = baseSim.totalInterestPaid;
        let basePMT = baseSim.chartData[0].payment;
        
        let activeSim = generateSimulationData(earlyRepayments);
        
        let sortedRepayments = [...earlyRepayments].sort((a, b) => a.index - b.index);
        cachedChartData = enrichChartDataWithEffects(activeSim.chartData, sortedRepayments);

        let validData = cachedChartData.filter(d => d.payment > 0);
        let regularPayments = validData.length > 1 ? validData.slice(0, -1).map(d => d.payment) : [validData[0]?.payment || 0];
        let minPMT = Math.min(...regularPayments);

        document.getElementById('stat-initial-payment').innerText = basePMT.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' 元';
        document.getElementById('stat-final-payment').innerText = minPMT.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' 元';
        let finalDate = validData.length > 0 ? validData[validData.length - 1].date : getMonthString(0);
        document.getElementById('stat-final-date').innerText = finalDate;
        
        let card3Badge = document.getElementById('stat-saved-time');
        let savedMonths = CONFIG.totalMonths - validData.length;
        if (savedMonths > 0) {
            let y = Math.floor(savedMonths / 12); let m = savedMonths % 12;
            card3Badge.innerText = `提前 ${y > 0 ? y+'年' : ''}${m}个月结清`;
            card3Badge.classList.remove('hidden');
        } else { card3Badge.classList.add('hidden'); }
        
        document.getElementById('stat-saved-interest').innerText = (baseTotalInterest - activeSim.totalInterestPaid).toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' 元';
        document.getElementById('stat-total-interest').innerText = activeSim.totalInterestPaid.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' 元';

        chartInstance.setOption(buildChartOption(cachedChartData, currentZoomStart, currentZoomEnd), true);
        updateDraggableGraphics();
        renderHistoryList(cachedChartData, sortedRepayments);
    }

    function renderHistoryList(chartData, sortedRepayments) {
        const tbody = document.getElementById('history-tbody');
        if (earlyRepayments.length === 0) {
            document.getElementById('repayment-list').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            return;
        }
        document.getElementById('repayment-list').classList.remove('hidden');
        document.getElementById('empty-state').classList.add('hidden');
        tbody.innerHTML = '';

        sortedRepayments.forEach((item, loopIndex) => {
            let targetYear = parseInt(getMonthString(item.index).split('-')[0], 10);
            let targetMonth = parseInt(getMonthString(item.index).split('-')[1], 10);
            let monthsGap = 0;

            if (loopIndex === 0) {
                let now = new Date();
                monthsGap = (targetYear - now.getFullYear()) * 12 + (targetMonth - (now.getMonth() + 1));
            } else {
                monthsGap = item.index - sortedRepayments[loopIndex - 1].index;
            }

            const gapTr = document.createElement('tr');
            if (monthsGap > 0) {
                let monthlySave = item.amount / monthsGap;
                let gapText = loopIndex === 0 ? `距今约 ${monthsGap} 个月` : `间隔 ${monthsGap} 个月`;
                gapTr.innerHTML = `<td colspan="5" class="p-0 border-0 bg-gray-50/30"><div class="flex items-center justify-center py-2 relative"><div class="h-px bg-gradient-to-r from-transparent via-blue-200 to-transparent flex-1 ml-10"></div><span class="mx-4 text-xs text-blue-600 bg-blue-50 border border-blue-100/50 px-4 py-1.5 rounded-full shadow-[0_2px_10px_-3px_rgba(59,130,246,0.3)] flex items-center gap-2 z-10 transition-transform hover:scale-105"><svg class="w-3.5 h-3.5 text-blue-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>${gapText}，期间需每月攒 <strong class="text-blue-700 font-bold text-[13px] ml-1">¥ ${Math.round(monthlySave).toLocaleString('zh-CN')}</strong></span><div class="h-px bg-gradient-to-r from-transparent via-blue-200 to-transparent flex-1 mr-10"></div></div></td>`;
            } else {
                gapTr.innerHTML = `<td colspan="5" class="p-0 border-0 bg-gray-50/30"><div class="flex items-center justify-center py-2 relative"><div class="h-px bg-gray-100 flex-1 ml-10"></div><span class="mx-4 text-xs text-gray-400 bg-gray-50 border border-gray-100 px-3 py-1 rounded-full flex items-center gap-1 z-10"><svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" /></svg>${loopIndex === 0 ? "当月或历史操作" : "同月操作"}，已一次性准备</span><div class="h-px bg-gray-100 flex-1 mr-10"></div></div></td>`;
            }
            tbody.appendChild(gapTr);

            let dataPoint = chartData.find(d => d.index === item.index);
            let year = parseInt(getMonthString(item.index).split('-')[0], 10);
            let month = parseInt(getMonthString(item.index).split('-')[1], 10);
            let ageStr = `(${Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0))}岁)`;
            
            let modeBadge = item.mode === 'shorten_time' ? `<span class="bg-purple-50 text-purple-600 px-2 py-1 rounded text-xs font-bold border border-purple-100">缩时间</span>` : `<span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs font-bold border border-blue-100">减月供</span>`;
            let currentPayment = dataPoint?.payment || 0;
            
            let effectHtml = item.mode === 'reduce_payment' || !item.mode ? 
                `<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">月供降至 <span class="font-bold text-emerald-600">${chartData.find(d => d.index === item.index + 1)?.payment.toFixed(2)}</span> 元 <span class="text-xs text-emerald-500 font-bold ml-1">(${dataPoint?.effectText})</span></td>` :
                `<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">月供维持 <span class="font-bold text-blue-600">${currentPayment.toFixed(2)}</span> 元 <span class="text-xs text-purple-600 font-bold ml-1">(${dataPoint?.effectText})</span></td>`;

            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-50 transition";
            tr.innerHTML = `<td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${getMonthString(item.index)} <span class="text-gray-400 text-xs ml-1">${ageStr}</span></td><td class="px-6 py-4 whitespace-nowrap text-sm text-rose-600 font-bold">${(item.amount / 10000).toFixed(2)} 万元</td><td class="px-6 py-4 whitespace-nowrap">${modeBadge}</td>${effectHtml}<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500"><button onclick="window.openModal(${item.index})" class="text-blue-500 hover:text-blue-700 font-medium transition bg-blue-50 px-3 py-1 rounded-md mr-2">编辑</button><button onclick="window.removeRepayment(${item.index})" class="text-red-500 hover:text-red-700 font-medium transition bg-red-50 px-3 py-1 rounded-md">删除</button></td>`;
            tbody.appendChild(tr);
        });
    }

    // --- Modal 交互与其他绑定 ---
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');
    const inputAmount = document.getElementById('input-amount');
    const errorMsg = document.getElementById('modal-error');
    const btnDelete = document.getElementById('btn-delete');

    function openModal(monthIndex) {
        currentSelectedIndex = monthIndex;
        let year = parseInt(getMonthString(monthIndex).split('-')[0], 10);
        let month = parseInt(getMonthString(monthIndex).split('-')[1], 10);
        document.getElementById('modal-subtitle').innerText = `操作时间节点: ${getMonthString(monthIndex)} (${Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0))} 岁)`;
        
        let exist = earlyRepayments.find(e => e.index === monthIndex);
        if (exist) {
            inputAmount.value = exist.amount / 10000;
            btnDelete.classList.remove('hidden');
            let mode = exist.mode || 'reduce_payment';
            document.querySelector(`input[name="modal-mode"][value="${mode}"]`).checked = true;
        } else {
            inputAmount.value = '';
            btnDelete.classList.add('hidden');
            document.querySelector('input[name="modal-mode"][value="reduce_payment"]').checked = true;
        }
        
        document.querySelector('input[name="modal-mode"]:checked').dispatchEvent(new Event('change'));
        errorMsg.classList.add('hidden');
        modal.classList.remove('hidden'); setTimeout(() => { modal.classList.remove('opacity-0'); modalContent.classList.remove('scale-95'); }, 10);
        inputAmount.focus();
    }

    function closeModal() {
        modal.classList.add('opacity-0'); modalContent.classList.add('scale-95');
        setTimeout(() => { modal.classList.add('hidden'); }, 300);
    }

    function confirmRepayment() {
        let val = parseFloat(inputAmount.value);
        if (isNaN(val) || val <= 0) { errorMsg.classList.remove('hidden'); return; }
        
        let amountInYuan = val * 10000;
        let selectedMode = document.querySelector('input[name="modal-mode"]:checked').value;
        
        let existIndex = earlyRepayments.findIndex(e => e.index === currentSelectedIndex);
        if (existIndex > -1) {
            earlyRepayments[existIndex].amount = amountInYuan;
            earlyRepayments[existIndex].mode = selectedMode;
        } else {
            earlyRepayments.push({ index: currentSelectedIndex, amount: amountInYuan, mode: selectedMode });
        }
        saveToLocalStorage(); closeModal(); updateDashboard();
    }

    document.querySelectorAll('input[name="modal-mode"]').forEach(radio => {
        radio.addEventListener('change', function() {
            document.querySelectorAll('input[name="modal-mode"]').forEach(r => {
                let p = r.closest('label'); p.classList.remove('border-blue-500', 'bg-blue-50'); p.querySelector('.modal-mode-check').classList.add('hidden'); p.querySelector('.modal-mode-border').classList.replace('border-blue-500', 'border-transparent');
            });
            if (this.checked) { let p = this.closest('label'); p.classList.add('bg-blue-50'); p.querySelector('.modal-mode-check').classList.remove('hidden'); p.querySelector('.modal-mode-border').classList.replace('border-transparent', 'border-blue-500'); }
        });
    });

    document.getElementById('input-birth-year').addEventListener('change', function(e) { let val = parseInt(e.target.value, 10); if (!isNaN(val) && val > 1900 && val < 2100) { birthYear = val; saveToLocalStorage(); updateDashboard(); }});
    document.getElementById('select-birth-month').addEventListener('change', function(e) { let val = parseInt(e.target.value, 10); if (!isNaN(val) && val >= 1 && val <= 12) { birthMonth = val; saveToLocalStorage(); updateDashboard(); }});
    window.openModal = openModal;
    window.removeRepayment = function(index) { earlyRepayments = earlyRepayments.filter(e => e.index !== index); saveToLocalStorage(); updateDashboard(); closeModal(); };
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('btn-confirm').addEventListener('click', confirmRepayment);
    document.getElementById('btn-delete').addEventListener('click', () => window.removeRepayment(currentSelectedIndex));
    document.getElementById('input-amount').addEventListener('keypress', function (e) { if (e.key === 'Enter') confirmRepayment(); });

    // 启动系统
    window.onload = () => { initChart(); updateDashboard(); };
</script>
</body>
</html>
