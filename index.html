<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房贷提前还款推演系统</title>
    <!-- 引入 Tailwind CSS 进行样式排版 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 ECharts 进行图表绘制 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; background-color: #f3f4f6; }
        .modal-bg { background-color: rgba(0, 0, 0, 0.5); }
    </style>
</head>
<body class="text-gray-800">

<div class="max-w-7xl mx-auto p-4 sm:p-6 lg:p-8">
    
    <!-- 头部信息 -->
    <div class="mb-8 flex flex-col lg:flex-row justify-between items-start lg:items-center gap-4">
        <div class="text-center sm:text-left">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">房贷提前还款推演系统</h1>
            <p class="text-gray-500 text-sm">
                初始本金: 135.5万元 | 利率: 2.9% | 终点: 2051年7月
            </p>
        </div>
        
        <div class="flex flex-col sm:flex-row gap-3 w-full lg:w-auto">
            <!-- 新增：出生年月配置 -->
            <div class="flex items-center bg-white px-4 py-3 rounded-xl shadow-sm border border-gray-100 overflow-x-auto">
                <label class="text-sm font-medium text-gray-700 whitespace-nowrap mr-2">出生年月:</label>
                <input type="number" id="input-birth-year" value="1995" class="form-input w-20 rounded-md border-gray-300 border px-2 py-1 text-sm focus:border-blue-500 focus:ring-blue-500 text-center font-bold text-blue-600">
                <span class="mx-1 text-gray-500 text-sm whitespace-nowrap">年</span>
                <select id="select-birth-month" class="w-16 rounded-md border-gray-300 border px-2 py-1 text-sm focus:border-blue-500 focus:ring-blue-500 text-center font-bold text-blue-600 bg-white">
                    <option value="1">1</option>
                    <option value="2">2</option>
                    <option value="3">3</option>
                    <option value="4">4</option>
                    <option value="5">5</option>
                    <option value="6">6</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                    <option value="11">11</option>
                    <option value="12">12</option>
                </select>
                <span class="ml-1 text-gray-500 text-sm whitespace-nowrap">月</span>
            </div>
            <!-- 移除全局还款策略选择，下放到每次操作中 -->
        </div>
    </div>

    <!-- 数据看板 -->
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-gray-400">
            <h3 class="text-sm font-medium text-gray-500">初始基准月供</h3>
            <p class="text-2xl font-bold text-gray-900 mt-1" id="stat-initial-payment">6,296 元</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-emerald-500 flex flex-col justify-center">
            <h3 class="text-sm font-medium text-gray-500" id="card2-title">当前最低常规月供</h3>
            <div class="flex items-baseline gap-2 mt-1">
                <p class="text-2xl font-bold text-emerald-600" id="stat-final-payment">6,296 元</p>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-blue-500 flex flex-col justify-center">
            <h3 class="text-sm font-medium text-gray-500" id="card3-title">预计最终结清时间</h3>
            <div class="flex items-baseline gap-2 mt-1">
                <p class="text-2xl font-bold text-blue-600" id="stat-final-date">2051-07</p>
                <p class="text-sm font-bold text-blue-500 hidden bg-blue-50 px-2 py-0.5 rounded" id="stat-saved-time"></p>
            </div>
        </div>
        <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-rose-500">
            <h3 class="text-sm font-medium text-gray-500">累计为您节省利息</h3>
            <p class="text-2xl font-bold text-rose-600 mt-1" id="stat-saved-interest">0 元</p>
        </div>
    </div>

    <!-- 图表区 (全宽) -->
    <div class="bg-white rounded-xl shadow-sm p-4 relative mb-6">
        <div class="mb-2 flex justify-between items-center">
            <h2 class="text-lg font-bold text-gray-800">月供变化曲线 (点击曲线上任意节点添加提前还款)</h2>
            <span class="text-xs text-gray-400 bg-gray-100 px-2 py-1 rounded">支持鼠标滚轮缩放</span>
        </div>
        <div id="chart-container" style="width: 100%; height: 500px;"></div>
    </div>

    <!-- 操作与历史记录区 (底部详情表格) -->
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">提前还款操作详情</h2>
        
        <div id="empty-state" class="text-center text-gray-400 py-10">
            <svg class="mx-auto h-12 w-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
            </svg>
            <p class="mt-2 text-sm">暂无记录，请点击上方图表节点添加</p>
        </div>

        <div id="repayment-list" class="overflow-x-auto hidden">
            <table class="min-w-full divide-y divide-gray-200">
                <thead class="bg-gray-50">
                    <tr>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作时间</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">提前还款金额</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">执行策略</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">产生的效果</th>
                        <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">操作</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200" id="history-tbody">
                    <!-- 表格行将通过 JS 动态插入这里 -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- 交互弹窗 (Modal) -->
<div id="modal" class="fixed inset-0 modal-bg flex items-center justify-center hidden z-50 opacity-0 transition-opacity duration-300">
    <div class="bg-white rounded-2xl shadow-2xl w-96 p-6 transform scale-95 transition-transform duration-300" id="modal-content">
        <h3 class="text-xl font-bold text-gray-900 mb-1">添加提前还款</h3>
        <p class="text-sm text-gray-500 mb-6" id="modal-subtitle">操作月份: 2026年3月</p>
        
        <div class="mb-4">
            <label class="block text-sm font-medium text-gray-700 mb-1">提前还款金额 (万元)</label>
            <div class="relative rounded-md shadow-sm">
                <input type="number" id="input-amount" class="form-input block w-full rounded-md border-gray-300 border px-4 py-2 focus:border-blue-500 focus:ring-blue-500 sm:text-sm" placeholder="例如: 3">
                <div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                    <span class="text-gray-500 sm:text-sm">万元</span>
                </div>
            </div>
            <p class="text-xs text-rose-500 mt-2 hidden" id="modal-error">请输入大于 0 的有效数字</p>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">本次还款策略配置</label>
            <div class="grid grid-cols-2 gap-3">
                <label class="relative flex cursor-pointer rounded-lg border bg-white p-3 shadow-sm focus:outline-none">
                    <input type="radio" name="modal-mode" value="reduce_payment" class="sr-only" checked>
                    <span class="flex flex-1">
                        <span class="flex flex-col">
                            <span class="block text-sm font-medium text-gray-900">减月供</span>
                            <span class="mt-1 flex items-center text-xs text-gray-500">年限不变</span>
                        </span>
                    </span>
                    <svg class="h-5 w-5 text-blue-600 hidden modal-mode-check" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                    <span class="pointer-events-none absolute -inset-px rounded-lg border-2 border-transparent modal-mode-border" aria-hidden="true"></span>
                </label>

                <label class="relative flex cursor-pointer rounded-lg border bg-white p-3 shadow-sm focus:outline-none">
                    <input type="radio" name="modal-mode" value="shorten_time" class="sr-only">
                    <span class="flex flex-1">
                        <span class="flex flex-col">
                            <span class="block text-sm font-medium text-gray-900">缩时间</span>
                            <span class="mt-1 flex items-center text-xs text-gray-500">月供不变</span>
                        </span>
                    </span>
                    <svg class="h-5 w-5 text-blue-600 hidden modal-mode-check" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" /></svg>
                    <span class="pointer-events-none absolute -inset-px rounded-lg border-2 border-transparent modal-mode-border" aria-hidden="true"></span>
                </label>
            </div>
        </div>

        <div class="mt-6 flex justify-between items-center">
            <button id="btn-delete" class="px-4 py-2 text-red-600 bg-red-50 rounded-lg hover:bg-red-100 transition hidden">清空此记录</button>
            <div class="flex gap-3 ml-auto">
                <button id="btn-cancel" class="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition">取消</button>
                <button id="btn-confirm" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition shadow-md">确认执行</button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- 核心配置与状态 ---
    const CONFIG = {
        principal: 1355000,    // 初始本金 135.5万
        annualRate: 0.029,     // 年化利率 2.9%
        startYear: 2026,
        startMonth: 3,         // 从 2026年3月算起
        totalMonths: 304       // 到2051年7月正好剩余 304 个月
    };

    // 状态管理：存放用户的提前还款操作 { index: 整数(距离起始的月数), amount: 金额(元), mode: 'reduce_payment' | 'shorten_time' }
    let earlyRepayments = []; 
    let birthYear = 1995; // 默认出生年份
    let birthMonth = 1;   // 默认出生月份
    
    // 初始化时从本地存储读取历史配置
    try {
        const savedData = localStorage.getItem('mortgage_repayments_v1');
        if (savedData) {
            const parsed = JSON.parse(savedData);
            // 兼容之前只存了数组的情况
            if (Array.isArray(parsed)) {
                earlyRepayments = parsed;
            } else {
                earlyRepayments = parsed.repayments || [];
                if (parsed.birthYear) birthYear = parsed.birthYear;
                if (parsed.birthMonth) birthMonth = parsed.birthMonth;
            }
            
            // 兼容历史遗留数据：确保每条记录都有 mode 字段，没有则默认使用“减月供”策略
            earlyRepayments = earlyRepayments.map(item => ({
                index: item.index,
                amount: item.amount,
                mode: item.mode || 'reduce_payment' 
            }));
        }
    } catch (e) {
        console.error('加载历史记录失败', e);
    }

    // 更新页面上的输入框及单选框初始值
    document.getElementById('input-birth-year').value = birthYear;
    document.getElementById('select-birth-month').value = birthMonth;

    // 辅助函数：将配置保存到本地存储
    function saveToLocalStorage() {
        localStorage.setItem('mortgage_repayments_v1', JSON.stringify({
            repayments: earlyRepayments,
            birthYear: birthYear,
            birthMonth: birthMonth
        }));
    }

    let currentSelectedIndex = 0; // 当前选中的图表月份索引
    let chartInstance = null;
    let baseTotalInterest = 0; // 基准总利息（不提前还款的情况）
    let lastRenderedYear = -1; // 记录 ECharts 当前渲染周期内最新渲染的年份
    let formatterResetTimer = null; // 用于重置渲染周期的防抖定时器

    // --- 核心数学计算 ---
    // 等额本息月供计算公式
    function calculatePMT(principal, monthlyRate, months) {
        if (principal <= 0) return 0;
        return principal * (monthlyRate * Math.pow(1 + monthlyRate, months)) / (Math.pow(1 + monthlyRate, months) - 1);
    }

    // 将月索引转换为 YYYY-MM 格式
    function getMonthString(index) {
        let y = CONFIG.startYear + Math.floor((CONFIG.startMonth - 1 + index) / 12);
        let m = ((CONFIG.startMonth - 1 + index) % 12) + 1;
        return `${y}-${m.toString().padStart(2, '0')}`;
    }

    // 生成整个周期的推演数据 (支持传入自定义的 earlyRepayments 数组用于预测)
    function generateSimulationData(repaymentsData = earlyRepayments) {
        let p = CONFIG.principal;
        let r = CONFIG.annualRate / 12;
        let n = CONFIG.totalMonths;
        
        let originalPMT = calculatePMT(p, r, n);
        let currentPMT = originalPMT;
        let data = [];
        let totalInterestPaid = 0;

        for (let i = 0; i < CONFIG.totalMonths; i++) {
            let earlyObj = repaymentsData.find(e => e.index === i);
            let earlyExtra = earlyObj ? earlyObj.amount : 0;
            let earlyMode = earlyObj ? (earlyObj.mode || 'reduce_payment') : null;

            if (p <= 0.01) {
                // 已提前还清，后续月份全部填充为 0，保持 X 轴时间刻度固定
                data.push({
                    index: i,
                    date: getMonthString(i),
                    payment: 0,
                    principalRemaining: 0,
                    extra: earlyExtra, // 允许用户在已还清阶段继续尝试点按
                    mode: earlyMode
                });
                continue;
            }

            let interest = p * r;
            
            // 如果最后一期常规月供超过了剩余本息和，按实际剩余本息结算
            let actualPMT = currentPMT;
            if (p * (1 + r) < currentPMT) {
                actualPMT = p * (1 + r);
            }
            let normalPrincipalPaid = actualPMT - interest;

            // 记录当月数据 (出图用)
            data.push({
                index: i,
                date: getMonthString(i),
                payment: actualPMT, // 本月月供
                principalRemaining: p,
                extra: earlyExtra,
                mode: earlyMode // 记录本月操作模式
            });

            // 结算当月本金
            totalInterestPaid += interest;
            p -= normalPrincipalPaid;
            
            if (earlyExtra > 0) {
                p -= earlyExtra;
                if (p < 0) p = 0; // 防止负数本金
                
                if (p > 0) {
                    // 如果是缩减月供模式，重新计算月供；缩短时间模式则 currentPMT 维持不变
                    if (earlyMode === 'reduce_payment') {
                        let remainingMonths = CONFIG.totalMonths - i - 1;
                        if (remainingMonths > 0) {
                            currentPMT = calculatePMT(p, r, remainingMonths);
                        }
                    }
                }
            }
        }

        return { chartData: data, totalInterestPaid };
    }

    // --- UI 与 交互 ---
    
    // 初始化图表
    function initChart() {
        chartInstance = echarts.init(document.getElementById('chart-container'));
        
        // 监听点击事件
        chartInstance.on('click', function (params) {
            if(params.componentType === 'series') {
                openModal(params.dataIndex);
            }
        });
        
        window.addEventListener('resize', () => chartInstance.resize());
    }

    // 渲染更新图表与数据
    function updateDashboard() {
        // 先计算基准数据（无提前还款）
        let baseSim = generateSimulationData([]);
        baseTotalInterest = baseSim.totalInterestPaid;
        let basePMT = baseSim.chartData[0].payment;
        
        // 计算真实数据
        let activeSim = generateSimulationData(earlyRepayments);
        let chartData = activeSim.chartData;

        // 提取真实的还款月份数据
        let validData = chartData.filter(d => d.payment > 0);

        // 提取最小的“常规”月供（忽略可能存在的最后一期极小的尾款）
        let regularPayments = validData.length > 1 ? validData.slice(0, -1).map(d => d.payment) : [validData[0]?.payment || 0];
        let minPMT = Math.min(...regularPayments);

        // 更新顶部卡片 1 (基准月供)
        document.getElementById('stat-initial-payment').innerText = basePMT.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' 元';
        
        // 更新顶部卡片 2 (当前最低月供)
        document.getElementById('stat-final-payment').innerText = minPMT.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' 元';
        
        // 更新顶部卡片 3 (结清时间)
        let finalDate = validData.length > 0 ? validData[validData.length - 1].date : getMonthString(0);
        document.getElementById('stat-final-date').innerText = finalDate;
        
        let card3Badge = document.getElementById('stat-saved-time');
        // 计算提前了多少时间
        let savedMonths = CONFIG.totalMonths - validData.length;
        if (savedMonths > 0) {
            let savedYears = Math.floor(savedMonths / 12);
            let savedM = savedMonths % 12;
            let timeStr = savedYears > 0 ? `${savedYears}年${savedM}个月` : `${savedM}个月`;
            card3Badge.innerText = `提前 ${timeStr} 结清`;
            card3Badge.classList.remove('hidden');
        } else {
            card3Badge.classList.add('hidden');
        }
        
        // 更新顶部卡片 4 (节省利息)
        let saved = baseTotalInterest - activeSim.totalInterestPaid;
        document.getElementById('stat-saved-interest').innerText = saved.toLocaleString('zh-CN', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + ' 元';

        // 配置 ECharts 选项
        // 使用阶梯线 (step: 'end') 能非常直观地展现“提前还款后月供瞬间掉落”的台阶感
        const option = {
            tooltip: {
                trigger: 'axis',
                formatter: function(params) {
                    let pt = params[0].data;
                    let year = parseInt(pt.date.split('-')[0], 10);
                    let month = parseInt(pt.date.split('-')[1], 10);
                    
                    // 精确计算年龄：当前年份减去出生年份，如果当前月份小于出生月份，则年龄减1
                    let currentAge = Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0));
                    
                    let str = `<div class="font-bold border-b pb-1 mb-1">${pt.date} <span class="text-orange-500 font-normal ml-1">(${currentAge}岁)</span></div>`;
                    
                    if (pt.payment <= 0.01) {
                        str += `<span class="text-emerald-500 font-bold text-[14px]">🎉 此时已提前结清房贷，月供为 0</span><br/>`;
                    } else {
                        str += `当月常规月供：<span class="text-blue-500 font-bold">${pt.payment.toFixed(2)}</span> 元<br/>`;
                        str += `剩余本金：${(pt.principalRemaining / 10000).toFixed(2)} 万元<br/>`;
                    }

                    if (pt.extra > 0) {
                        let modeText = pt.mode === 'shorten_time' ? '缩短年限' : '减小月供';
                        str += `<span class="text-rose-500 font-bold mt-1 inline-block">✨ 本月提前还款：${(pt.extra / 10000).toFixed(2)} 万元 [${modeText}]</span><br/>`;
                        str += `<span class="text-xs text-gray-500">点击节点可修改/新增金额</span>`;
                    } else if (pt.payment > 0.01) {
                        str += `<span class="text-xs text-gray-500">点击此节点可添加提前还款</span>`;
                    }
                    return str;
                }
            },
            dataZoom: [
                { type: 'inside', start: 0, end: 100 },
                { type: 'slider', start: 0, end: 100, height: 20, bottom: 5 }
            ],
            grid: { left: '3%', right: '4%', bottom: '15%', top: '5%', containLabel: true },
            xAxis: {
                type: 'category',
                boundaryGap: false,
                data: chartData.map(d => d.date),
                axisLabel: { 
                    color: '#6b7280',
                    // 新增：智能年龄感知格式化
                    formatter: function (value) {
                        let parts = value.split('-');
                        let year = parseInt(parts[0], 10);
                        let month = parseInt(parts[1], 10);
                        
                        // 利用防抖定时器：在 ECharts 每次执行完完整的刻度渲染后，重置记忆状态
                        clearTimeout(formatterResetTimer);
                        formatterResetTimer = setTimeout(() => { lastRenderedYear = -1; }, 50);

                        let str = `{year|${value}}`;

                        // 确保每个渲染周期内，同一年只展示一次最早的可见月份的年龄
                        if (year !== lastRenderedYear) {
                            lastRenderedYear = year;
                            let currentAge = Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0));
                            str += `\n{age|${currentAge}岁}`;
                        }
                        return str;
                    },
                    rich: {
                        year: { color: '#6b7280', lineHeight: 22 },
                        age: { color: '#ea580c', fontWeight: 'bold', fontSize: 11, backgroundColor: '#ffedd5', padding: [2, 5], borderRadius: 4, align: 'center' }
                    }
                }
            },
            yAxis: {
                type: 'value',
                name: '月供 (元)',
                min: function(value) { return Math.max(0, value.min - 1000); },
                axisLabel: { color: '#6b7280' },
                splitLine: { lineStyle: { type: 'dashed', color: '#e5e7eb' } }
            },
            series: [
                {
                    name: '月供金额',
                    type: 'line',
                    step: 'end', // 阶梯折线图，更符合按揭规则
                    markPoint: {
                        symbol: 'pin',
                        symbolSize: 45,
                        label: { color: '#fff', fontSize: 10, formatter: '{c}' },
                        itemStyle: { color: '#ef4444' },
                        data: chartData.filter(d => d.extra > 0).map(d => ({
                            name: '提前还款',
                            coord: [d.date, d.payment],
                            value: (d.extra / 10000) + '万'
                        }))
                    },
                    data: chartData.map(d => ({
                        value: d.payment,
                        date: d.date,
                        payment: d.payment,
                        principalRemaining: d.principalRemaining,
                        extra: d.extra,
                        // 如果有提前还款，突出显示该点
                        symbolSize: d.extra > 0 ? 12 : 6,
                        itemStyle: {
                            color: d.extra > 0 ? '#ef4444' : '#3b82f6',
                            borderWidth: d.extra > 0 ? 3 : 1
                        }
                    })),
                    lineStyle: { width: 3, color: '#3b82f6' },
                    areaStyle: {
                        color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                            { offset: 0, color: 'rgba(59, 130, 246, 0.4)' },
                            { offset: 1, color: 'rgba(59, 130, 246, 0.0)' }
                        ])
                    }
                }
            ]
        };

        chartInstance.setOption(option);
        renderHistoryList(chartData);
    }

    // 渲染底部的记录列表表格
    function renderHistoryList(chartData) {
        const listDiv = document.getElementById('repayment-list');
        const emptyDiv = document.getElementById('empty-state');
        const tbody = document.getElementById('history-tbody');
        
        if (earlyRepayments.length === 0) {
            listDiv.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }

        listDiv.classList.remove('hidden');
        emptyDiv.classList.add('hidden');
        tbody.innerHTML = '';

        // 按时间线排序
        let sortedRepayments = [...earlyRepayments].sort((a, b) => a.index - b.index);
        
        // 提取最终结清时间 (缩短时间模式下极其有用)
        let validData = chartData.filter(d => d.payment > 0);
        let finalEndDate = validData.length > 0 ? validData[validData.length - 1].date : chartData[0].date;
        let finalYear = parseInt(finalEndDate.split('-')[0], 10);
        let finalMonth = parseInt(finalEndDate.split('-')[1], 10);
        let finalAge = Math.max(0, finalYear - birthYear - (finalMonth < birthMonth ? 1 : 0));

        sortedRepayments.forEach((item, loopIndex) => {
            // 精确计算操作时的年龄
            let year = parseInt(getMonthString(item.index).split('-')[0], 10);
            let month = parseInt(getMonthString(item.index).split('-')[1], 10);
            let currentAge = Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0));
            let ageStr = `(${currentAge}岁)`;

            let modeBadge, effectHtml;

            if (item.mode === 'reduce_payment' || !item.mode) {
                modeBadge = `<span class="bg-blue-50 text-blue-600 px-2 py-1 rounded text-xs font-bold border border-blue-100">减月供</span>`;
                
                let currentPayment = chartData.find(d => d.index === item.index)?.payment || 0;
                let nextData = chartData.find(d => d.index === item.index + 1);
                let nextPayment = nextData ? nextData.payment : 0;
                let savedMonthly = currentPayment - nextPayment;
                
                effectHtml = `<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">月供降至 <span class="font-bold text-emerald-600">${nextPayment.toFixed(2)}</span> 元 <span class="text-xs text-gray-400 ml-1">(↓ ${savedMonthly.toFixed(2)})</span></td>`;
            } else {
                modeBadge = `<span class="bg-purple-50 text-purple-600 px-2 py-1 rounded text-xs font-bold border border-purple-100">缩时间</span>`;
                
                let currentPayment = chartData.find(d => d.index === item.index)?.payment || 0;
                
                // 计算本次操作所缩短的时间
                // 逻辑：计算“不包含本次操作的之前的记录”算出的结清月数，减去“包含本次及之前的记录”算出的结清月数
                let previousRepayments = sortedRepayments.slice(0, loopIndex);
                let currentRepayments = sortedRepayments.slice(0, loopIndex + 1);
                
                let previousSim = generateSimulationData(previousRepayments).chartData.filter(d => d.payment > 0);
                let currentSim = generateSimulationData(currentRepayments).chartData.filter(d => d.payment > 0);
                
                let savedMonthsByThisAction = previousSim.length - currentSim.length;
                let savedTimeStr = "";
                if (savedMonthsByThisAction > 0) {
                    let y = Math.floor(savedMonthsByThisAction / 12);
                    let m = savedMonthsByThisAction % 12;
                    if (y > 0) {
                        savedTimeStr = `↓ ${y}年${m}个月`;
                    } else {
                        savedTimeStr = `↓ ${m}个月`;
                    }
                } else {
                    savedTimeStr = "无变化"; // 理论上不会走到这，除非还款额极小
                }

                effectHtml = `<td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700">月供维持 <span class="font-bold text-blue-600">${currentPayment.toFixed(2)}</span> 元 <span class="text-xs text-emerald-500 font-bold ml-1">(${savedTimeStr})</span></td>`;
            }

            const tr = document.createElement('tr');
            tr.className = "hover:bg-gray-50 transition";
            tr.innerHTML = `
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">${getMonthString(item.index)} <span class="text-gray-400 text-xs ml-1">${ageStr}</span></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-rose-600 font-bold">${(item.amount / 10000).toFixed(2)} 万元</td>
                <td class="px-6 py-4 whitespace-nowrap">${modeBadge}</td>
                ${effectHtml}
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                    <button onclick="window.openModal(${item.index})" class="text-blue-500 hover:text-blue-700 font-medium transition bg-blue-50 px-3 py-1 rounded-md mr-2">编辑</button>
                    <button onclick="window.removeRepayment(${item.index})" class="text-red-500 hover:text-red-700 font-medium transition bg-red-50 px-3 py-1 rounded-md">删除</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- 事件监听与处理 ---
    
    // 监听出生年份的变化
    document.getElementById('input-birth-year').addEventListener('change', function(e) {
        let val = parseInt(e.target.value, 10);
        if (!isNaN(val) && val > 1900 && val < 2100) {
            birthYear = val;
            saveToLocalStorage();
            updateDashboard(); // 年份改变后重新渲染图表
        }
    });

    // 监听出生月份的变化
    document.getElementById('select-birth-month').addEventListener('change', function(e) {
        let val = parseInt(e.target.value, 10);
        if (!isNaN(val) && val >= 1 && val <= 12) {
            birthMonth = val;
            saveToLocalStorage();
            updateDashboard(); // 月份改变后重新渲染图表
        }
    });

    // Modal 单选框 UI 交互逻辑
    document.querySelectorAll('input[name="modal-mode"]').forEach(radio => {
        radio.addEventListener('change', function() {
            // 重置所有样式
            document.querySelectorAll('input[name="modal-mode"]').forEach(r => {
                let parent = r.closest('label');
                parent.classList.remove('border-blue-500', 'bg-blue-50');
                parent.querySelector('.modal-mode-check').classList.add('hidden');
                parent.querySelector('.modal-mode-border').classList.replace('border-blue-500', 'border-transparent');
            });
            // 激活选中样式
            if (this.checked) {
                let parent = this.closest('label');
                parent.classList.add('bg-blue-50');
                parent.querySelector('.modal-mode-check').classList.remove('hidden');
                parent.querySelector('.modal-mode-border').classList.replace('border-transparent', 'border-blue-500');
            }
        });
    });

    // 触发一下默认选中状态的样式
    document.querySelector('input[name="modal-mode"]:checked').dispatchEvent(new Event('change'));


    // --- Modal 弹窗逻辑 ---
    const modal = document.getElementById('modal');
    const modalContent = document.getElementById('modal-content');
    const inputAmount = document.getElementById('input-amount');
    const errorMsg = document.getElementById('modal-error');
    const btnDelete = document.getElementById('btn-delete');

    function openModal(monthIndex) {
        currentSelectedIndex = monthIndex;
        let year = parseInt(getMonthString(monthIndex).split('-')[0], 10);
        let month = parseInt(getMonthString(monthIndex).split('-')[1], 10);
        let currentAge = Math.max(0, year - birthYear - (month < birthMonth ? 1 : 0));
        
        document.getElementById('modal-subtitle').innerText = `操作时间节点: ${getMonthString(monthIndex)} (${currentAge} 岁)`;
        
        // 如果该月已经有设置，填入默认值并展示清空按钮
        let exist = earlyRepayments.find(e => e.index === monthIndex);
        if (exist) {
            inputAmount.value = exist.amount / 10000;
            btnDelete.classList.remove('hidden');
            // 恢复模式选择
            let mode = exist.mode || 'reduce_payment';
            document.querySelector(`input[name="modal-mode"][value="${mode}"]`).checked = true;
        } else {
            inputAmount.value = '';
            btnDelete.classList.add('hidden');
            document.querySelector('input[name="modal-mode"][value="reduce_payment"]').checked = true;
        }
        
        // 触发样式更新
        document.querySelector('input[name="modal-mode"]:checked').dispatchEvent(new Event('change'));
        
        errorMsg.classList.add('hidden');
        modal.classList.remove('hidden');
        // 小小的动画延迟
        setTimeout(() => {
            modal.classList.remove('opacity-0');
            modalContent.classList.remove('scale-95');
        }, 10);
        inputAmount.focus();
    }

    function closeModal() {
        modal.classList.add('opacity-0');
        modalContent.classList.add('scale-95');
        setTimeout(() => {
            modal.classList.add('hidden');
        }, 300);
    }

    function confirmRepayment() {
        let val = parseFloat(inputAmount.value);
        if (isNaN(val) || val <= 0) {
            errorMsg.classList.remove('hidden');
            return;
        }
        
        let amountInYuan = val * 10000;
        let selectedMode = document.querySelector('input[name="modal-mode"]:checked').value;
        
        // 查找是否已存在，存在则更新，不存在则推入
        let existIndex = earlyRepayments.findIndex(e => e.index === currentSelectedIndex);
        if (existIndex > -1) {
            earlyRepayments[existIndex].amount = amountInYuan;
            earlyRepayments[existIndex].mode = selectedMode;
        } else {
            earlyRepayments.push({ index: currentSelectedIndex, amount: amountInYuan, mode: selectedMode });
        }

        // 保存到本地存储
        saveToLocalStorage();

        closeModal();
        updateDashboard();
    }

    // 暴露给外部按钮使用
    window.openModal = openModal;
    
    window.removeRepayment = function(index) {
        earlyRepayments = earlyRepayments.filter(e => e.index !== index);
        
        // 删除后同步更新本地存储
        saveToLocalStorage();
        
        updateDashboard();
        closeModal(); // 如果从弹窗内点击删除，顺便关闭弹窗
    }

    // 绑定事件
    document.getElementById('btn-cancel').addEventListener('click', closeModal);
    document.getElementById('btn-confirm').addEventListener('click', confirmRepayment);
    document.getElementById('btn-delete').addEventListener('click', () => removeRepayment(currentSelectedIndex));
    inputAmount.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') confirmRepayment();
    });

    // 启动系统
    window.onload = () => {
        initChart();
        updateDashboard();
    };

</script>
</body>
</html>
